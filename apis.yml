aid: konfig
name: Konfig
description: >-
  Konfig is a developer tools platform that generates SDKs, documentation,
  demos, and tutorials for REST APIs based on OpenAPI Specifications and
  Postman Collection Format. It automatically generates and publishes SDKs
  in all major programming languages including Python, TypeScript, Java,
  C#, Go, Ruby, PHP, Swift, and Kotlin.
