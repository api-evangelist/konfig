apis:
  - aid: konfig:konfig-sdk-generation
    name: Konfig SDK Generation Platform (Sunset)
    description: >-
      Konfig's developer platform for generating, validating, and publishing
      SDKs, API reference documentation, and interactive tutorials from
      OpenAPI specifications and Postman Collections. Delivered primarily
      through the konfig-cli command-line interface and GitHub Actions
      integration. Konfig never published a public REST API for the platform
      itself. The platform was sunset in December 2024 along with the
      konfigthis.com hosted offering.
