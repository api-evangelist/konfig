aid: konfig
name: Konfig
description: >-
  Konfig was a developer-tools startup that generated SDKs, API documentation,
  interactive demos, and tutorials from OpenAPI Specifications and Postman
  Collections, delivered primarily through the konfig-cli command-line interface
  and GitHub Actions automation. The company was sunset in December 2024;
  founder Dylan Huang announced the closure in a "Closing My Startup" blog post
  on November 25, 2024. The flagship konfig generator repository's GitHub
  description now reads "SDK & API Docs Generator. Sunset as of December 2024."
  This index is retained as a historical record of the platform and the
  consolidation of the SDK-generation category around Stainless, Fern, and
  Speakeasy.
type: Index
